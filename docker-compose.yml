version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ebook2latex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_URL: postgresql+psycopg2://postgres:postgres@db:5432/ebook2latex
      UPLOAD_DIR: uploads

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
